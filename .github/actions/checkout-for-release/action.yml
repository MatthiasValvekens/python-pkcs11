name: checkout-for-release
author: matthias
description: checkout-for-release
inputs:
  version:
    description: Version number to release
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
    - name: Install build tools
      shell: bash
      run: uv sync --no-dev --group release --no-install-project --exact
    - name: Apply package version for release
      shell: bash
      run: |
        uv run python tools/apply_version.py ${{ inputs.version }}
        git diff
