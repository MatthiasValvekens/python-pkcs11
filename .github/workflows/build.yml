name: Build wheels
on:
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-latest]
    steps:
      - name: Acquire sources
        uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.0.0
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl